<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Telemetría - Premium Racing Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    
    <style>
        /* --- TUS ESTILOS ORIGINALES MANTENIDOS --- */
        :root { --bg-puro: #06090e; --neon-cian: #00f0ff; --neon-rojo: #ff2a2a; --neon-rojo-dim: #991b1b; --plata-metal: #e2e8f0; --texto-principal: #ffffff; --texto-secundario: #64748b; --glass-bg: rgba(10, 16, 26, 0.75); --glass-borde: rgba(0, 240, 255, 0.15); --glass-borde-rojo: rgba(255, 42, 42, 0.25); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-puro); color: var(--texto-principal); min-height: 100vh; overflow-x: hidden; position: relative; background-image: radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 0.4) 0%, #04060a 100%), linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111), linear-gradient(45deg, #111 25%, #181818 25%, #181818 75%, #111 75%, #111); background-size: 100% 100%, 8px 8px, 8px 8px; background-position: 0 0, 0 0, 4px 4px; }
        
        .franja-header { width: 100%; height: 80px; position: relative; display: flex; align-items: center; justify-content: center; padding: 0 40px; background: rgba(4, 6, 9, 0.9); border-bottom: 2px solid var(--neon-cian); box-shadow: 0 5px 30px rgba(0, 240, 255, 0.15); margin-bottom: 40px; z-index: 10; }
        .header-ala-izq { position: absolute; left: 0; top: 0; width: 28%; height: 100%; background: linear-gradient(135deg, var(--neon-rojo-dim) 0%, #450a0a 100%); clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%); border-right: 3px solid var(--neon-rojo); box-shadow: inset -10px 0 20px rgba(255,42,42,0.2); }
        .header-ala-der { position: absolute; right: 0; top: 0; width: 18%; height: 100%; background: linear-gradient(-135deg, #1e293b 0%, #0f172a 100%); clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%); border-left: 2px solid var(--plata-metal); }
        .header-content-centro { z-index: 12; text-align: center; }
        .header-content-centro h1 { font-size: 22px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: #ffffff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }
        .status-box { display: inline-flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.6); padding: 4px 14px; border-radius: 20px; font-size: 10px; font-weight: 800; letter-spacing: 1px; color: var(--neon-cian); border: 1px solid rgba(0, 240, 255, 0.3); margin-top: 4px; }
        .punto-pulso { width: 6px; height: 6px; border-radius: 50%; background-color: var(--neon-cian); box-shadow: 0 0 8px var(--neon-cian); animation: latido 1.5s infinite; }
        @keyframes latido { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(1); opacity: 0.5; } }
        
        .contenedor-principal { max-width: 1440px; margin: 0 auto; padding: 0 25px 40px 25px; }
        .barra-pestanas { display: flex; justify-content: center; gap: 12px; margin-bottom: 35px; }
        .btn-pestana { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.08); color: var(--texto-secundario); padding: 12px 26px; font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.25s ease; backdrop-filter: blur(4px); clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%); }
        .btn-pestana.activa { background: rgba(220, 38, 38, 0.2); color: #ffffff; border: 1px solid var(--neon-rojo); }
        .contenido-pestana { display: none; }
        .contenido-pestana.activa { display: block; }

        /* --- NUEVO GRID PARA DATOS EN PESTAÑA 2 --- */
        .grid-telemetria { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .tarjeta-hud { background: var(--glass-bg); border: 1px solid var(--glass-borde); border-radius: 6px; padding: 30px; backdrop-filter: blur(12px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); position: relative; }
        .tarjeta-hud h2 { font-size: 15px; color: var(--neon-cian); margin-bottom: 15px; text-transform: uppercase; }
        
        /* ... resto de tus estilos originales (flechas, animaciones, etc.) ... */
    </style>
</head>
<body>
    <div class="franja-header">
        <div class="header-ala-izq"></div>
        <div class="header-ala-der"></div>
        <div class="header-content-centro">
            <h1>CARRITO EVASOR DE OBSTÁCULOS CON RF</h1>
            <div class="status-box"><div class="punto-pulso"></div><span id="txt-status">ADAFRUIT TELEMETRY BROADCAST</span></div>
        </div>
    </div>

    <div class="contenedor-principal">
        <div class="barra-pestanas">
            <button class="btn-pestana activa" onclick="irTab(0)">FICHA TÉCNICA</button>
            <button class="btn-pestana" onclick="irTab(1)">TELEMETRÍA EN VIVO</button>
            <button class="btn-pestana" onclick="irTab(2)">ANÁLISIS DINÁMICO</button>
        </div>

        <div id="tab-0" class="contenido-pestana activa">
            </div>

        <div id="tab-1" class="contenido-pestana">
            <div class="grid-telemetria">
                <div class="tarjeta-hud"><h2>ÁNGULO SERVO</h2><canvas id="chartServo"></canvas></div>
                <div class="tarjeta-hud"><h2>DISTANCIA (ULTRASONIDO)</h2><canvas id="chartDistancia"></canvas></div>
                <div class="tarjeta-hud"><h2>SENSORES INFRARROJOS</h2><div id="dataIR" style="color:white; font-size: 20px;">Esperando datos...</div></div>
                <div class="tarjeta-hud"><h2>VELOCIDAD (ENCODER)</h2><canvas id="chartVelocidad"></canvas></div>
            </div>
        </div>

        <div id="tab-2" class="contenido-pestana">
            </div>
    </div>

    <script>
        // Lógica MQTT (tu original)
        const aio_username = "diegLOT";
        const aio_key = "aio_BjKV42vCquxCE2cBAhTOPqfhmmmf";
        const client = new Paho.MQTT.Client("io.adafruit.com", 8083, "web-client-" + parseInt(Math.random() * 100));

        client.onMessageArrived = (message) => {
            console.log("Datos recibidos: " + message.payloadString);
            // Aquí enlazaremos los datos a los IDs: chartServo, chartDistancia, dataIR, chartVelocidad
        };

        client.connect({ userName: aio_username, password: aio_key, useSSL: true, onSuccess: () => {
            client.subscribe(`${aio_username}/feeds/telemetria`);
        }});

        // Navegación (tu original)
        function irTab(num) { /* ... */ }
        function cambiarTab(dir) { /* ... */ }
    </script>
</body>
</html>
