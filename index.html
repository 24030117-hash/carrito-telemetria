        .flecha-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            cursor: pointer;
            padding: 20px;
            color: var(--neon-cian);
            font-size: 2rem;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
        }

        .flecha-nav:hover {
            color: var(--neon-rojo);
            text-shadow: 0 0 10px var(--neon-rojo);
        }

        .f-izq { left: 10px; }
        .f-der { right: 10px; }
