<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Telemetría - Carrito Evasor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ESTILOS GENERALES Y PALETA DE COLORES --- */
        :root {
            --bg-principal: #0f172a;
            --bg-tarjeta: #1e293b;
            --bg-tarjeta-hover: #25354f;
            --texto-principal: #f8fafc;
            --texto-secundario: #94a3b8;
            --color-activo: #38bdf8;
            --color-alerta: #ef4444;
            --color-exito: #22c55e;
            --color-advertencia: #eab308;
            --borde-tarjeta: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            min-height: 100vh;
            display: block;
            padding: 25px;
        }

        .contenedor-principal {
            max-width: 1600px; /* Expandido para aprovechar pantallas panorámicas */
            margin: 0 auto;
            position: relative;
        }

        /* --- ENCABEZADO Y ESTADO DE CONEXIÓN --- */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--borde-tarjeta);
        }

        header h1 {
            font-size: 28px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--texto-principal);
            margin-bottom: 10px;
        }

        .estado-conexion {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            background-color: rgba(235, 179, 8, 0.1);
            color: var(--color-advertencia);
            transition: all 0.4s ease;
        }

        .estado-conexion.conectado {
            background-color: rgba(34, 197, 94, 0.1);
            color: var(--color-exito);
        }

        .punto-pulso {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: currentColor;
            box-shadow: 0 0 10px currentColor;
        }
