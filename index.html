<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Telemetría - Premium Racing Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ... (MANTENGO TODO TU CSS ORIGINAL HASTA ANTES DE FLECHAS) ... */
        :root {
            --bg-puro: #06090e;
            --neon-cian: #00f0ff;
            --neon-rojo: #ff2a2a;
            --neon-rojo-dim: #991b1b;
            --plata-metal: #e2e8f0;
            --texto-principal: #ffffff;
            --texto-secundario: #64748b;
            --glass-bg: rgba(10, 16, 26, 0.75);
            --glass-borde: rgba(0, 240, 255, 0.15);
            --glass-borde-rojo: rgba(255, 42, 42, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-puro);
            color: var(--texto-principal);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            background-image: radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 0.4) 0%, #04060a 100%), linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111), linear-gradient(45deg, #111 25%, #181818 25%, #181818 75%, #111 75%, #111);
            background-size: 100% 100%, 8px 8px, 8px 8px;
            background-position: 0 0, 0 0, 4px 4px;
        }

        /* --- [CSS DEL HEADER Y CONTENIDO SE MANTIENE INTEGRAL] --- */
        .franja-header { width: 100%; height: 80px; position: relative; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; background: rgba(4, 6, 9, 0.9); border-bottom: 2px solid var(--neon-cian); margin-bottom: 40px; z-index: 10; }
        .contenedor-principal { max-width: 1440px; margin: 0 auto; padding: 0 25px 40px 25px; }
        .barra-pestanas { display: flex; justify-content: center; gap: 12px; margin-bottom: 35px; }
        .btn-pestana { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.08); color: var(--texto-secundario); padding: 12px 26px; font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.25s ease; backdrop-filter: blur(4px); clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%); }
        .btn-pestana.activa { background: rgba(220, 38, 38, 0.2); color: #ffffff; border: 1px solid var(--neon-rojo); }
        .contenido-pestana { display: none; }
        .contenido-pestana.activa { display: block; }

        /* =========================================================================
            NUEVAS FLECHAS: DISEÑO DE CHEVRONS DEPORTIVOS/TECH
           ========================================================================= */
        .contenedor-flechas {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 100;
            padding: 15px;
            transition: transform 0.2s ease;
        }

        .contenedor-flechas:hover { transform: translateY(-50%) scale(1.1); }
        .flecha-izq { left: 10px; }
        .flecha-der { right: 10px; }

        .chevron {
            width: 24px;
            height: 14px;
            background: #ffffff;
            transition: all 0.3s ease;
            opacity: 0.6;
        }

        /* Forma geométrica de chevron */
        .flecha-izq .chevron { clip-path: polygon(100% 0, 40% 50%, 100% 100%, 80% 100%, 20% 50%, 80% 0); }
        .flecha-der .chevron { clip-path: polygon(0 0, 60% 50%, 0 100%, 20% 100%, 80% 50%, 20% 0); }

        .contenedor-flechas:hover .chevron {
            background: var(--neon-rojo);
            opacity: 1;
            filter: drop-shadow(0 0 8px var(--neon-rojo));
        }

        /* Efecto de degradado secuencial */
        .contenedor-flechas:hover .chevron:nth-child(1) { opacity: 0.4; }
        .contenedor-flechas:hover .chevron:nth-child(2) { opacity: 0.7; }
        .contenedor-flechas:hover .chevron:nth-child(3) { opacity: 1; }
    </style>
</head>
<body>

    <div class="franja-header"></div>

    <div class="contenedor-flechas flecha-izq" onclick="cambiarTab(-1)">
        <div class="chevron"></div>
        <div class="chevron"></div>
        <div class="chevron"></div>
    </div>

    <div class="contenedor-flechas flecha-der" onclick="cambiarTab(1)">
        <div class="chevron"></div>
        <div class="chevron"></div>
        <div class="chevron"></div>
    </div>

    <div class="contenedor-principal">
        </div>

    <script>
        // Tu lógica JS original...
        let tabActual = 0;
        function cambiarTab(dir) { /* ... */ }
    </script>
</body>
</html>
