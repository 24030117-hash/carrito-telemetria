<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Paleta inspirada en software de ingeniería profesional */
        :root {
            --bg: #0b0c10;
            --surface: #171a21;
            --accent: #00e5ff;
            --text-primary: #e1e1e6;
            --text-secondary: #8892b0;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        h1 { font-size: 1.2rem; letter-spacing: 0.1rem; font-weight: 500; color: var(--text-secondary); }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
        }

        /* Contenedor del Carrito - Limpio */
        .viewer {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .viewer img {
            max-width: 500px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        /* Panel de specs - Diseño minimalista */
        .specs {
            background: var(--surface);
            padding: 30px;
            border-radius: 8px;
        }

        .specs h2 {
            font-size: 0.9rem;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .item { margin-bottom: 25px; }
        .label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .value { font-size: 1rem; font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <h1>SYSTEM_TELEMETRY // PROTOTYPE</h1>
        <img src="logo.png" height="40" alt="Logo">
    </header>

    <div class="dashboard">
        <div class="viewer">
            <img src="carrito.png" alt="Carrito">
        </div>

        <div class="specs">
            <h2>System Configuration</h2>
            <div class="item"><span class="label">Primary MCU</span><span class="value">ESP32 WROOM</span></div>
            <div class="item"><span class="label">Coprocessor</span><span class="value">Arduino Nano</span></div>
            <div class="item"><span class="label">Radio Link</span><span class="value">HC-12 (433 MHz)</span></div>
            <div class="item"><span class="label">Cloud Protocol</span><span class="value">MQTT / Adafruit IO</span></div>
            <div class="item"><span class="label">Perimeter Sensor</span><span class="value">Ultrasonic + Servo</span></div>
            <div class="item"><span class="label">Floor Tracking</span><span class="value">Dual IR TCRT5000</span></div>
            <div class="item"><span class="label">Power Unit</span><span class="value">Li-Ion 18650</span></div>
        </div>
    </div>
</body>
</html>
