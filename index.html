<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Telemetría - Premium Racing Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- CONFIGURACIÓN DE COLORES DE INSTRUMENTACIÓN --- */
        :root {
            --bg-puro: #06090e;
            --neon-cian: #00f0ff;
            --neon-rojo: #ff2a2a;
            --neon-rojo-dim: #991b1b;
            --plata-metal: #e2e8f0;
            --texto-principal: #ffffff;
            --texto-secundario: #64748b;
            
            /* Cristal esmerilado premium */
            --glass-bg: rgba(10, 16, 26, 0.75);
            --glass-borde: rgba(0, 240, 255, 0.15);
            --glass-borde-rojo: rgba(255, 42, 42, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-puro);
            color: var(--texto-principal);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;

            /* 🏎️ TEXTURA TEXTURIZADA DE FIBRA DE CARBONO DE ALTA DENSIDAD */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 0.4) 0%, #04060a 100%),
                linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111), 
                linear-gradient(45deg, #111 25%, #181818 25%, #181818 75%, #111 75%, #111);
            background-size: 100% 100%, 8px 8px, 8px 8px;
            background-position: 0 0, 0 0, 4px 4px;
        }

        /* =========================================================================
            🏎️ ENCABEZADO AGRESIVO TIPO HUD AUTOMOTRIZ
        ========================================================================= */
        .franja-header {
            width: 100%;
            height: 80px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(4, 6, 9, 0.9);
            border-bottom: 2px solid var(--neon-cian);
            box-shadow: 0 5px 30px rgba(0, 240, 255, 0.15);
            margin-bottom: 40px;
            z-index: 10;
        }

        .header-ala-izq {
            position: absolute;
            left: 0;
            top: 0;
            width: 28%;
            height: 100%;
            background: linear-gradient(135deg, var(--neon-rojo-dim) 0%, #450a0a 100%);
            clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%);
            border-right: 3px solid var(--neon-rojo);
            box-shadow: inset -10px 0 20px rgba(255,42,42,0.2);
        }

        .header-ala-der {
            position: absolute;
            right: 0;
            top: 0;
            width: 18%;
            height: 100%;
            background: linear-gradient(-135deg, #1e293b 0%, #0f172a 100%);
            clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
            border-left: 2px solid var(--plata-metal);
        }

        .header-content-izq { z-index: 12; width: 20%; }

        .header-content-centro {
            z-index: 12;
            text-align: center;
            flex-grow: 1;
        }

        .header-content-centro h1 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .status-box {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--neon-cian);
            border: 1px solid rgba(0, 240, 255, 0.3);
            margin-top: 4px;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .punto-pulso {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--neon-cian);
            box-shadow: 0 0 8px var(--neon-cian);
            animation: latido 1.5s infinite;
        }

        @keyframes latido {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .header-content-der {
            z-index: 12;
        }

        /* 🖼️ CORRECCIÓN: Fondo transparente para el logo */
        .logo-img {
            height: 52px;
            background: transparent; /* Eliminado fondo blanco */
            padding: 0;              /* Eliminado padding */
        }

        /* =========================================================================
            📊 CONTENEDORES INTERNOS Y TABS (GLASSMORPHISM INTERACTIVO)
        ========================================================================= */
        .contenedor-principal {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 25px 40px 25px;
        }

        .barra-pestanas {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
        }

        .btn-pestana {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--texto-secundario);
            padding: 12px 26px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
        }

        .btn-pestana:hover {
            color: var(--texto-principal);
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(255,255,255,0.2);
        }

        .btn-pestana.activa {
            background: rgba(220, 38, 38, 0.2);
            color: #ffffff;
            border: 1px solid var(--neon-rojo);
            box-shadow: 0 0 15px rgba(255, 42, 42, 0.25);
            text-shadow: 0 0 5px #fff;
        }

        .contenido-pestana { display: none; }
        .contenido-pestana.activa { display: block; }

        .grid-layout {
            display: grid;
            grid-template-columns: 1.2s 1fr;
            gap: 30px;
        }

        @media(max-width: 1024px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .tarjeta-hud {
            background: var(--glass-bg);
            border: 1px solid var(--glass-borde);
            border-radius: 6px;
            padding: 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 240, 255, 0.02);
            position: relative;
        }

        .tarjeta-hud::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px;
            width: 12px; height: 12px;
            border-top: 2px solid var(--neon-cian);
            border-left: 2px solid var(--neon-cian);
        }

        .tarjeta-hud.borde-rojo { border-color: var(--glass-borde-rojo); }
        .tarjeta-hud.borde-rojo::before {
            border-top-color: var(--neon-rojo);
            border-left-color: var(--neon-rojo);
        }

        .tarjeta-hud h2 {
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--neon-cian);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tarjeta-hud.borde-rojo h2 { color: var(--neon-rojo); }

        .tabla-valores { width: 100%; border-collapse: collapse; }
        .tabla-valores tr { border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
        .tabla-valores td { padding: 16px 10px; font-size: 13px; }
        .tabla-valores td.label { color: var(--texto-secundario); font-weight: 600; text-transform: uppercase; }
        .tabla-valores td.value { text-align: right; font-weight: 700; color: var(--plata-metal); }

        .sub-badge {
            background: rgba(0, 240, 255, 0.1);
            color: var(--neon-cian);
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 800;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        .wrapper-render {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 450px;
        }

        .render-principal {
            max-width: 360px;
            width: 90%;
            z-index: 2;
            filter: drop-shadow(0 0 25px rgba(0, 240, 255, 0.25));
            animation: suspension 3.5s ease-in-out infinite;
        }

        .laser-scanner {
            position: absolute;
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cian), transparent);
            box-shadow: 0 0 12px var(--neon-cian);
            top: 20%;
            z-index: 3;
            animation: scan 4s linear infinite;
        }

        .anillo-holografico {
            position: absolute;
            bottom: 30px;
            width: 420px;
            height: 100px;
            border: 2px dashed rgba(0, 240, 255, 0.4);
            border-radius: 50%;
            transform: rotateX(75deg);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2), inset 0 0 30px rgba(0, 240, 255, 0.2);
            animation: rotarAnillo 20s linear infinite;
        }

        @keyframes suspension { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes scan { 0% { top: 20%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 75%; opacity: 0; } }
        @keyframes rotarAnillo { 100% { transform: rotateX(75deg) rotate(360deg); } }

        .flecha-cambio {
            position: fixed; top: 55%; transform: translateY(-50%);
            width: 120px; height: 60px;
            background: transparent; border: none; cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="franja-header">
        <div class="header-ala-izq"></div>
        <div class="header-ala-der"></div>
        <div class="header-content-izq"></div>
        <div class="header-content-centro">
            <h1>CARRITO EVASOR DE OBSTÁCULOS CON RF</h1>
            <div class="status-box">
                <div class="punto-pulso"></div>
                <span id="txt-status">ADAFRUIT TELEMETRY BROADCAST</span>
            </div>
        </div>
        <div class="header-content-der">
            <img src="logofinal.png" class="logo-img" alt="Logo Automotriz" onerror="this.style.opacity='0.5'">
        </div>
    </div>

    <script>
        // Lógica de navegación...
    </script>
</body>
</html>
