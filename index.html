<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Telemetría - Premium Racing Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-puro: #06090e;
            --neon-cian: #00f0ff;
            --neon-rojo: #ff2a2a;
            --neon-rojo-dim: #991b1b;
            --plata-metal: #e2e8f0;
            --texto-principal: #ffffff;
            --texto-secundario: #64748b;
            --glass-bg: rgba(10, 16, 26, 0.75);
            --glass-borde: rgba(0, 240, 255, 0.15);
            --glass-borde-rojo: rgba(255, 42, 42, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-puro);
            color: var(--texto-principal);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 0.4) 0%, #04060a 100%),
                linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111), 
                linear-gradient(45deg, #111 25%, #181818 25%, #181818 75%, #111 75%, #111);
            background-size: 100% 100%, 8px 8px, 8px 8px;
            background-position: 0 0, 0 0, 4px 4px;
        }

        .franja-header {
            width: 100%;
            height: 80px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 40px;
            background: rgba(4, 6, 9, 0.9);
            border-bottom: 2px solid var(--neon-cian);
            box-shadow: 0 5px 30px rgba(0, 240, 255, 0.15);
            margin-bottom: 40px;
            z-index: 10;
        }

        .header-ala-izq {
            position: absolute; left: 0; top: 0; width: 28%; height: 100%;
            background: linear-gradient(135deg, var(--neon-rojo-dim) 0%, #450a0a 100%);
            clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%);
            border-right: 3px solid var(--neon-rojo);
        }

        .header-ala-der {
            position: absolute; right: 0; top: 0; width: 18%; height: 100%;
            background: linear-gradient(-135deg, #1e293b 0%, #0f172a 100%);
            clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
            border-left: 2px solid var(--plata-metal);
        }

        .header-content-centro { z-index: 12; text-align: center; }
        .header-content-centro h1 { font-size: 22px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: #ffffff; }

        .status-box {
            display: inline-flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.6);
            padding: 4px 14px; border-radius: 20px; font-size: 10px; font-weight: 800;
            color: var(--neon-cian); border: 1px solid rgba(0, 240, 255, 0.3); margin-top: 4px;
        }

        .punto-pulso { width: 6px; height: 6px; border-radius: 50%; background-color: var(--neon-cian); animation: latido 1.5s infinite; }
        @keyframes latido { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 1; } }

        .contenedor-principal { max-width: 1440px; margin: 0 auto; padding: 0 25px 40px 25px; }
        .barra-pestanas { display: flex; justify-content: center; gap: 12px; margin-bottom: 35px; }
        .btn-pestana { 
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.08); color: var(--texto-secundario);
            padding: 12px 26px; font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer;
            backdrop-filter: blur(4px); clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
        }
        .btn-pestana.activa { background: rgba(220, 38, 38, 0.2); color: #ffffff; border: 1px solid var(--neon-rojo); }
        .contenido-pestana { display: none; }
        .contenido-pestana.activa { display: block; }
        .grid-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; }
        .tarjeta-hud { background: var(--glass-bg); border: 1px solid var(--glass-borde); border-radius: 6px; padding: 30px; backdrop-filter: blur(12px); position: relative; }
        .tarjeta-hud.borde-rojo { border-color: var(--glass-borde-rojo); }
        .tarjeta-hud h2 { color: var(--neon-cian); font-size: 15px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .tabla-valores { width: 100%; border-collapse: collapse; }
        .tabla-valores td { padding: 16px 10px; font-size: 13px; }
        .tabla-valores td.label { color: var(--texto-secundario); text-transform: uppercase; }
        .tabla-valores td.value { text-align: right; color: var(--plata-metal); font-weight: 700; }
        .sub-badge { background: rgba(0, 240, 255, 0.1); color: var(--neon-cian); padding: 3px 10px; border-radius: 3px; font-size: 11px; border: 1px solid rgba(0, 240, 255, 0.2); }
        .wrapper-render { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; min-height: 450px; }
        .render-principal { max-width: 360px; z-index: 2; animation: suspension 3.5s ease-in-out infinite; }
        @keyframes suspension { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        .flecha-cambio { position: fixed; top: 55%; transform: translateY(-50%); width: 120px; height: 60px; background: transparent; border: none; cursor: pointer; z-index: 100; }
        .f-izq { left: 20px; } .f-der { right: 20px; }
    </style>
</head>
<body>

    <div class="franja-header">
        <div class="header-ala-izq"></div>
        <div class="header-ala-der"></div>
        <div class="header-content-centro">
            <h1>CARRITO EVASOR DE OBSTÁCULOS CON RF</h1>
            <div class="status-box">
                <div class="punto-pulso"></div>
                <span>ADAFRUIT TELEMETRY BROADCAST</span>
            </div>
        </div>
    </div>

    <button class="flecha-cambio f-izq" onclick="cambiarTab(-1)"></button>
    <button class="flecha-cambio f-der" onclick="cambiarTab(1)"></button>

    <div class="contenedor-principal">
        <div class="barra-pestanas">
            <button class="btn-pestana activa" onclick="irTab(0)">01 // FICHA TÉCNICA</button>
            <button class="btn-pestana" onclick="irTab(1)">02 // TELEMETRÍA EN VIVO</button>
            <button class="btn-pestana" onclick="irTab(2)">03 // ANÁLISIS DINÁMICO</button>
        </div>

        <div id="tab-0" class="contenido-pestana activa">
            <div class="grid-layout">
                <div class="wrapper-render">
                    <img src="carrito.png" class="render-principal" alt="Prototipo">
                </div>
                <div class="tarjeta-hud borde-rojo">
                    <h2><i class="fa-solid fa-gears"></i> CONFIGURACIÓN DEL SISTEMA</h2>
                    <table class="tabla-valores">
                        <tr><td class="label">Unidad de Control</td><td class="value"><span class="sub-badge">ESP32 WROOM 32U</span></td></tr>
                        <tr><td class="label">Coprocesador</td><td class="value">Arduino Nano V3</td></tr>
                        <tr><td class="label">Enlace</td><td class="value">HC-12 / 433 MHz</td></tr>
                    </table>
                </div>
            </div>
        </div>
        <div id="tab-1" class="contenido-pestana"><div class="tarjeta-hud"><h2>TELEMETRÍA</h2></div></div>
        <div id="tab-2" class="contenido-pestana"><div class="tarjeta-hud"><h2>ANÁLISIS</h2></div></div>
    </div>

    <script>
        let tabActual = 0;
        function irTab(num) {
            document.querySelectorAll('.contenido-pestana').forEach(el => el.classList.remove('activa'));
            document.querySelectorAll('.btn-pestana').forEach(el => el.classList.remove('activa'));
            tabActual = num;
            document.getElementById(`tab-${num}`).classList.add('activa');
            document.querySelectorAll('.btn-pestana')[num].classList.add('activa');
        }
        function cambiarTab(dir) {
            let s = tabActual + dir;
            if(s >= 3) s = 0; if(s < 0) s = 2;
            irTab(s);
        }
    </script>
</body>
</html>
