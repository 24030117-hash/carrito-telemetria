<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Telemetría - Premium Racing Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-puro: #06090e;
            --neon-cian: #00f0ff;
            --neon-rojo: #ff2a2a;
            --neon-rojo-dim: #991b1b;
            --plata-metal: #e2e8f0;
            --texto-principal: #ffffff;
            --texto-secundario: #64748b;
            --glass-bg: rgba(10, 16, 26, 0.75);
            --glass-borde: rgba(0, 240, 255, 0.15);
            --glass-borde-rojo: rgba(255, 42, 42, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-puro);
            color: var(--texto-principal);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 0.4) 0%, #04060a 100%);
        }

        .franja-header {
            width: 100%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(4, 6, 9, 0.9);
            border-bottom: 2px solid var(--neon-cian);
            margin-bottom: 40px;
        }

        /* LOGO SIN FONDO BLANCO */
        .logo-img {
            height: 52px;
            background: transparent; 
            padding: 0;
            display: block;
        }

        .header-content-centro { text-align: center; flex-grow: 1; }
        .header-content-centro h1 { font-size: 22px; text-transform: uppercase; letter-spacing: 3px; }

        .status-box {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 10px;
            color: var(--neon-cian);
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        .contenedor-principal { max-width: 1440px; margin: 0 auto; padding: 0 25px; }

        .barra-pestanas { display: flex; justify-content: center; gap: 12px; margin-bottom: 35px; }

        .btn-pestana {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--texto-secundario);
            padding: 12px 26px;
            cursor: pointer;
        }

        .btn-pestana.activa { border-color: var(--neon-rojo); color: #fff; }

        .contenido-pestana { display: none; }
        .contenido-pestana.activa { display: block; }
    </style>
</head>
<body>

    <div class="franja-header">
        <div class="header-content-centro">
            <h1>CARRITO EVASOR DE OBSTÁCULOS CON RF</h1>
            <div class="status-box">
                <span>ADAFRUIT TELEMETRY BROADCAST</span>
            </div>
        </div>
        <img src="logofinal.png" class="logo-img" alt="Logo">
    </div>

    <div class="contenedor-principal">
        <div class="barra-pestanas">
            <button class="btn-pestana activa" onclick="irTab(0)">01 // FICHA TÉCNICA</button>
            <button class="btn-pestana" onclick="irTab(1)">02 // TELEMETRÍA EN VIVO</button>
            <button class="btn-pestana" onclick="irTab(2)">03 // ANÁLISIS DINÁMICO</button>
        </div>

        <div id="tab-0" class="contenido-pestana activa">
            <h2 style="color:var(--neon-cian)">CONTENIDO DE FICHA TÉCNICA AQUÍ</h2>
        </div>
        <div id="tab-1" class="contenido-pestana">
            <h2 style="color:var(--neon-cian)">CONTENIDO DE TELEMETRÍA AQUÍ</h2>
        </div>
        <div id="tab-2" class="contenido-pestana">
            <h2 style="color:var(--neon-cian)">CONTENIDO DE ANÁLISIS AQUÍ</h2>
        </div>
    </div>

    <script>
        function irTab(num) {
            document.querySelectorAll('.contenido-pestana').forEach(t => t.classList.remove('activa'));
            document.querySelectorAll('.btn-pestana').forEach(b => b.classList.remove('activa'));
            document.getElementById(`tab-${num}`).classList.add('activa');
            document.querySelectorAll('.btn-pestana')[num].classList.add('activa');
        }
    </script>
</body>
</html>
