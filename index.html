<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Telemetría - Racing Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-puro: #06090e;
            --neon-rojo: #ff2a2a;
            --texto-secundario: #64748b;
            --plata-metal: #e2e8f0;
        }

        body {
            background-color: var(--bg-puro);
            color: #fff;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .contenedor-global {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* FLECHAS: Corregidas para visibilidad absoluta */
        .btn-chevron {
            position: absolute;
            top: 50%;
            z-index: 999;
            background: rgba(0,0,0,0.5);
            border: none;
            cursor: pointer;
            padding: 20px 10px;
            display: flex;
            gap: 5px;
        }
        .f-izq { left: 10px; }
        .f-der { right: 10px; }

        .chevron-segmento {
            width: 10px;
            height: 30px;
            background: var(--texto-secundario);
        }
        .f-izq .chevron-segmento { clip-path: polygon(100% 0, 30% 50%, 100% 100%, 70% 100%, 0% 50%, 70% 0); }
        .f-der .chevron-segmento { clip-path: polygon(0 0, 70% 50%, 0 100%, 30% 100%, 100% 50%, 30% 0); }

        .btn-chevron:hover .chevron-segmento { background: var(--neon-rojo); }

        /* Estilos básicos para mantener el layout */
        .franja-header { height: 70px; background: #000; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: center; }
        .contenedor-principal { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .tarjeta-hud { width: 90%; background: #0f172a; border: 1px solid #333; padding: 20px; margin-top: 10px; }
        .tabla-valores { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .tabla-item { border: 1px solid #222; padding: 10px; }
    </style>
</head>
<body>

<div class="contenedor-global">
    <header class="franja-header">
        <h1>CARRITO EVASOR DE OBSTÁCULOS</h1>
    </header>

    <button class="btn-chevron f-izq" onclick="cambiarTab(-1)">
        <div class="chevron-segmento"></div><div class="chevron-segmento"></div><div class="chevron-segmento"></div>
    </button>
    <button class="btn-chevron f-der" onclick="cambiarTab(1)">
        <div class="chevron-segmento"></div><div class="chevron-segmento"></div><div class="chevron-segmento"></div>
    </button>

    <div class="contenedor-principal">
        <div id="tab-0" class="contenido-pestana">
            <div style="height: 200px; background: #111; width: 100%; margin-bottom: 20px; display:flex; align-items:center; justify-content:center;">
                [RENDER DEL CARRITO]
            </div>
            <div class="tarjeta-hud">
                <h2>CONFIGURACIÓN</h2>
                <div class="tabla-valores">
                    <div class="tabla-item">Unidad: ESP32</div>
                    <div class="tabla-item">Radio: HC-12</div>
                    <div class="tabla-item">Visión: US</div>
                    <div class="tabla-item">Energía: 7.4V</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let tabActual = 0;
    function cambiarTab(dir) {
        // Lógica de cambio aquí
        console.log("Cambiando...");
    }
</script>
</body>
</html>
