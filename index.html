<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Telemetría - Carrito Evasor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ESTILOS GENERALES Y PALETA DE COLORES --- */
        :root {
            --bg-principal: #0f172a;
            --bg-tarjeta: #1e293b;
            --bg-tarjeta-hover: #25354f;
            --texto-principal: #f8fafc;
            --texto-secundario: #94a3b8;
            --color-activo: #38bdf8;
            --color-alerta: #ef4444;
            --color-exito: #22c55e;
            --color-advertencia: #eab308;
            --borde-tarjeta: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            min-height: 100vh;
            padding: 25px;
        }

        .contenedor-principal {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
        }

        /* --- ENCABEZADO Y ESTADO DE CONEXIÓN --- */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--borde-tarjeta);
        }

        header h1 {
            font-size: 28px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--texto-principal);
            margin-bottom: 10px;
        }

        .estado-conexion {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            background-color: rgba(235, 179, 8, 0.1);
            color: var(--color-advertencia);
            transition: all 0.4s ease;
        }

        .estado-conexion.conectado {
            background-color: rgba(34, 197, 94, 0.1);
            color: var(--color-exito);
        }

        .punto-pulso {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: currentColor;
            box-shadow: 0 0 10px currentColor;
        }

        /* --- SISTEMA DE PESTAÑAS (TABS) --- */
        .barra-pestanas {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
        }

        .btn-pestana {
            background: var(--bg-tarjeta);
            border: 1px solid var(--borde-tarjeta);
            color: var(--texto-secundario);
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-pestana:hover {
            background: var(--bg-tarjeta-hover);
            color: var(--texto-principal);
        }

        .btn-pestana.activa {
            background: var(--color-activo);
            color: var(--bg-principal);
            border-color: var(--color-activo);
            box-shadow: 0 4px 18px rgba(56, 189, 248, 0.35);
        }

        /* --- CONTENEDOR DE CONTENIDO DE PESTAÑA --- */
        .contenido-pestana {
            display: none;
            min-height: 550px;
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        .contenido-pestana.activa {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- NAVEGACIÓN POR FLECHAS LATERALES --- */
        .flecha-nav {
            position: fixed;
            top: 55%;
            transform: translateY(-50%);
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--borde-tarjeta);
            color: var(--texto-principal);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .flecha-nav:hover {
            background: var(--color-activo);
            color: var(--bg-principal);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .flecha-izq { left: 25px; }
        .flecha-der { right: 25px; }

        /* --- NUEVA MAQUETACIÓN ASIMÉTRICA (FICHA TÉCNICA) --- */
        .layout-ficha-libre {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            width: 100%;
            min-height: 600px;
            padding: 0 20px;
        }

        /* Columna Izquierda Libre (Imagen + Proyección) */
        .columna-holograma {
            flex: 1.2; /* Toma un poco más de espacio a la izquierda */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            height: 100%;
        }

        .placeholder-img-libre {
            width: 100%;
            max-width: 580px; /* Tamaño masivo del prototipo */
            height: auto;
            object-fit: contain;
            z-index: 2;
            filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.5));
            animation: flotacionLigera 4s ease-in-out infinite;
        }

        /* Base de Contorno de Proyección Circular (CSS Avanzado) */
        .base-holografica {
            position: absolute;
            bottom: -20px;
            width: 500px;
            height: 140px;
            background: radial-gradient(ellipse at center, rgba(56, 189, 248, 0.2) 0%, rgba(56, 189, 248, 0) 70%);
            border: 4px double rgba(56, 189, 248, 0.6);
            border-radius: 50%;
            transform: rotateX(65deg);
            z-index: 1;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3), inset 0 0 30px rgba(56, 189, 248, 0.2);
            animation: rotacionBase 20s linear infinite;
        }

        .base-holografica::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 2px dashed rgba(56, 189, 248, 0.4);
            border-radius: 50%;
        }

        @keyframes flotacionLigera {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes rotacionBase {
            from { transform: rotateX(65deg) rotate(0deg); }
            to { transform: rotateX(65deg) rotate(360deg); }
        }

        /* Columna Derecha (Ficha Técnica Contenida) */
        .columna-ficha-tarjeta {
            flex: 0.9;
            width: 100%;
        }

        .tarjeta-ficha {
            background: var(--bg-tarjeta);
            border: 1px solid var(--borde-tarjeta);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.35);
        }

        .tarjeta-ficha h2 {
            font-size: 22px;
            color: var(--color-activo);
            margin-bottom: 25px;
            border-left: 5px solid var(--color-activo);
            padding-left: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tabla-spec {
            width: 100%;
            border-collapse: collapse;
        }

        .tabla-spec tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tabla-spec tr:last-child {
            border-bottom: none;
        }

        .tabla-spec td {
            padding: 18px 12px;
            font-size: 16px;
        }

        .tabla-spec td.propiedad {
            color: var(--texto-secundario);
            font-weight: 500;
        }

        .tabla-spec td.valor {
            color: var(--texto-principal);
            font-weight: 600;
            text-align: right;
        }

        .badge-micro {
            background: rgba(56, 189, 248, 0.15);
            color: var(--color-activo);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        /* --- SECCIÓN DE TELEMETRÍA GRIDS --- */
        .seccion-telemetria {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .fila-telemetria {
            display: flex;
            gap: 25px;
            width: 100%;
        }

        .tarjeta-medicion {
            background: var(--bg-tarjeta);
            border: 1px solid var(--borde-tarjeta);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .tarjeta-ancha { flex: 2; }
        .tarjeta-angosta { flex: 1; }

        .tarjeta-titulo {
            font-size: 14px;
            color: var(--texto-secundario);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tarjeta-valor {
            font-size: 42px;
            font-weight: bold;
            color: var(--color-activo);
            margin-bottom: 12px;
        }

        .tarjeta-valor span {
            font-size: 20px;
            color: var(--texto-secundario);
            margin-left: 5px;
        }

        .canvas-contenedor {
            width: 100%;
            height: 160px;
            position: relative;
        }

        /* Indicadores Infrarrojos */
        .contenedor-infrarrojos {
            display: flex;
            gap: 15px;
            height: 160px;
            margin-top: 15px;
        }

        .sensor-ir {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: var(--texto-secundario);
            transition: all 0.3s ease;
        }

        .sensor-ir.detection {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--color-alerta);
            color: var(--color-alerta);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }

        /* --- MAQUETACIÓN PESTAÑA 3 (CÁLCULO MATEMÁTICO) --- */
        .tarjeta-calculo {
            background: var(--bg-tarjeta);
            border: 1px solid var(--borde-tarjeta);
            border-radius: 12px;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

            padding: 30px;
            border-radius:
