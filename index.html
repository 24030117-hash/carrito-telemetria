<!DOCTYPE html>
<html lang="es">
<head>
    <title>Console - Carrito Evasor con RF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg-color: #060a13;
            --panel-bg: rgba(13, 22, 38, 0.75);
            --border-cyan: #00f0ff;
            --accent-red: #ff2a2a;
            --text-main: #ffffff;
            --text-muted: #6b7c96;
            --panel-border: rgba(0, 240, 255, 0.15);
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        /* --- BANNER SUPERIOR ASIMÉTRICO --- */
        .header-banner {
            background: linear-gradient(135deg, var(--accent-red) 0%, #111 25%, #111 75%, var(--panel-border) 100%);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent-red);
            position: relative;
            z-index: 5000;
        }

        .header-banner h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .status-indicator {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--border-cyan);
            padding: 4px 10px;
            border-radius: 20px;
            margin-top: 5px;
            background: rgba(0, 240, 255, 0.05);
        }

        /* --- PESTAÑAS --- */
        .hud-tabs-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 25px auto;
            max-width: 1000px;
        }

        .hud-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hud-tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px 24px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .hud-tab-btn.active {
            color: var(--text-main);
            background: linear-gradient(to bottom, rgba(255, 42, 42, 0.2), transparent);
            border-bottom: 2px solid var(--accent-red);
        }

        /* --- CONTENIDOS --- */
        .tab-content { display: none; width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 20px; box-sizing: border-box; }
        .tab-content.active { display: block; }

        /* --- FLECHAS NAVEGACIÓN --- */
        .hud-massive-arrow {
            position: fixed; top: 50%; transform: translateY(-50%); background: none; border: none;
            color: var(--accent-red); font-size: 8rem; cursor: pointer; z-index: 10000;
        }
        .massive-arrow-left { left: 80px; }
        .massive-arrow-right { right: 80px; }

        /* --- ESTILOS DE PANELES --- */
        .specs-panel, .telemetry-card, .formula-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .panel-title { color: var(--accent-red); font-size: 0.85rem; text-transform: uppercase; margin-top: 0; }
        .big-numeric { font-size: 3rem; font-weight: 800; color: var(--border-cyan); font-family: monospace; margin: 10px 0; }
        .specs-blocks-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .spec-block-item { background: rgba(6, 10, 19, 0.6); padding: 14px; border-radius: 6px; border-left: 3px solid var(--border-cyan); }
        
        .math-display { font-size: 1.6rem; padding: 25px; background: rgba(0,0,0,0.4); border-radius: 4px; font-family: monospace; text-align: center; }
        .fraccion { display: inline-flex; flex-direction: column; vertical-align: middle; }
        .numerador { border-bottom: 2px solid white; }

        .ir-row { display: flex; gap: 15px; margin-top: 25px; }
        .ir-sensor { flex: 1; padding: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .ir-sensor.active-line { border-color: var(--border-cyan); color: var(--border-cyan); background: rgba(0, 240, 255, 0.1); }
    </style>
</head>
<body>

    <div class="header-banner">
        <h1>Carrito Evasor de Obstáculos con RF</h1>
        <div id="status-mqtt" class="status-indicator">📡 CONECTANDO TELEMETRÍA...</div>
    </div>

    <button class="hud-massive-arrow massive-arrow-left" onclick="adjustTab(-1)">&#10216;</button>
    <button class="hud-massive-arrow massive-arrow-right" onclick="adjustTab(1)">&#10217;</button>

    <div class="hud-tabs-container">
        <div class="hud-tabs">
            <button class="hud-tab-btn active" id="btn-0" onclick="switchTab(0)">01 // Ficha Técnica</button>
            <button class="hud-tab-btn" id="btn-1" onclick="switchTab(1)">02 // Telemetría</button>
            <button class="hud-tab-btn" id="btn-2" onclick="switchTab(2)">03 // Análisis</button>
        </div>
    </div>

    <div id="tab-0" class="tab-content active">
        <div class="specs-panel">
            <h4 class="panel-title">Especificaciones del Prototipo</h4>
            <div class="specs-blocks-grid">
                <div class="spec-block-item"><span>Controlador:</span><br><strong>ESP32 DevKit V1</strong></div>
                <div class="spec-block-item"><span>Inalámbrico:</span><br><strong>Radio HC-12</strong></div>
                <div class="spec-block-item"><span>Sensor:</span><br><strong>HC-SR04</strong></div>
                <div class="spec-block-item"><span>Actuador:</span><br><strong>Servo SG90</strong></div>
            </div>
        </div>
    </div>

    <div id="tab-1" class="tab-content">
        <div class="telemetry-card">
            <h4 class="panel-title">Distancia (cm)</h4>
            <div id="val-dist" class="big-numeric">--</div>
        </div>
        <div class="ir-row">
            <div id="ir-izq" class="ir-sensor">IZQUIERDA</div>
            <div id="ir-der" class="ir-sensor">DERECHA</div>
        </div>
    </div>

    <div id="tab-2" class="tab-content">
        <div class="formula-container">
            <h4 class="panel-title">Cálculo de Frenado</h4>
            <div class="math-display">
                S<sub>b</sub> = (<span id="iso-f1">v</span> · 0.05) + <div class="fraccion"><div class="numerador"><span id="iso-f2">v</span><sup>2</sup></div><div>3.00</div></div> + 0.10
            </div>
            <div id="iso-res" class="big-numeric" style="color: var(--accent-red);">-- cm</div>
        </div>
    </div>

    <script>
        const AIO_USER = "dieglot"; 
        const AIO_KEY  = "aio_ZDIL93htQcCNZPsK" + "GWzc2DiXU9Ii"; 
        const AIO_FEED = "dieglot/feeds/telemetria"; 
        const BROKER   = "wss://io.adafruit.com:443/mqtt";

        let activeTabIdx = 0;

        function switchTab(index) {
            activeTabIdx = index;
            document.querySelectorAll('.tab-content').forEach((el, i) => {
                el.style.display = (i === index) ? 'block' : 'none';
            });
            document.querySelectorAll('.hud-tab-btn').forEach((el, i) => {
                el.className = (i === index) ? 'hud-tab-btn active' : 'hud-tab-btn';
            });
        }

        function adjustTab(dir) {
            activeTabIdx = (activeTabIdx + dir + 3) % 3;
            switchTab(activeTabIdx);
        }

        const client = mqtt.connect(BROKER, { username: AIO_USER, password: AIO_KEY });
        client.on('connect', () => document.getElementById('status-mqtt').innerText = "LIVE: CONECTADO");
        
        client.on('message', (topic, msg) => {
            const raw = msg.toString().split(',');
            if(raw.length >= 5) {
                const d = raw[0], s = raw[1], il = raw[2], ir = raw[3], r = raw[4];
                document.getElementById('val-dist').innerText = d + " cm";
                document.getElementById('ir-izq').className = (il == "1") ? 'ir-sensor active-line' : 'ir-sensor';
                document.getElementById('ir-der').className = (ir == "1") ? 'ir-sensor active-line' : 'ir-sensor';
                
                const v = r * 0.003455;
                const sb = ((v * 0.05) + (Math.pow(v, 2) / 3.0) + 0.10) * 100;
                document.getElementById('iso-f1').innerText = v.toFixed(2);
                document.getElementById('iso-f2').innerText = v.toFixed(2);
                document.getElementById('iso-res').innerText = sb.toFixed(1) + " cm";
            }
        });
        client.subscribe(AIO_FEED);
    </script>
</body>
</html>
