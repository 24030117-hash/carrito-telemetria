<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-deep: #0a0d14;
            --panel-bg: #11151c;
            --accent-cyan: #00e5ff;
            --text-main: #ffffff;
            --text-dim: #8b949e;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Header Limpio */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #2d333b;
            margin-bottom: 30px;
        }

        .title-group h1 { font-size: 22px; letter-spacing: 1px; margin: 0; }

        /* Contenedor Principal */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 30px;
            align-items: center;
        }

        /* Visualización del Carrito (Estilo exhibición) */
        .viewer-box {
            background: var(--panel-bg);
            border: 1px solid #2d333b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            border-radius: 4px;
        }

        /* Tarjeta de Ficha Técnica (Estilo Profesional) */
        .specs-panel {
            background: var(--panel-bg);
            border: 1px solid #2d333b;
            padding: 25px;
            border-radius: 4px;
        }

        .specs-panel h2 {
            font-size: 14px;
            color: var(--accent-cyan);
            text-transform: uppercase;
            margin-bottom: 20px;
            border-left: 3px solid var(--accent-cyan);
            padding-left: 10px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1f242d;
        }

        .label { color: var(--text-dim); font-size: 13px; }
        .value { font-weight: 600; font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <div class="title-group">
            <h1>CARRITO EVASOR DE OBSTÁCULOS CON RF</h1>
        </div>
        <img src="logo.png" height="50" alt="Logo">
    </header>

    <main class="dashboard-grid">
        <div class="viewer-box">
            <img src="carrito.png" alt="Prototipo" style="max-width: 80%;">
        </div>

        <div class="specs-panel">
            <h2>Configuración del Sistema</h2>
            <div class="data-row"><span class="label">Procesador Maestro</span><span class="value">ESP32 WROOM</span></div>
            <div class="data-row"><span class="label">Coprocesador</span><span class="value">Arduino Nano</span></div>
            <div class="data-row"><span class="label">Enlace de Radio</span><span class="value">HC-12 (433 MHz)</span></div>
            <div class="data-row"><span class="label">Protocolo Cloud</span><span class="value">MQTT / Adafruit</span></div>
            <div class="data-row"><span class="label">Proximidad</span><span class="value">Ultrasonido + Servo</span></div>
            <div class="data-row"><span class="label">Sensores de Piso</span><span class="value">2x TCRT5000</span></div>
            <div class="data-row"><span class="label">Power Unit</span><span class="value">Li-Ion 18650</span></div>
        </div>
    </main>

</body>
</html>
