<!DOCTYPE html>
<html>
<head>
    <title>Console - Carrito Evasor con RF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg-color: #060a13;
            --panel-bg: rgba(13, 22, 38, 0.75);
            --border-cyan: #00f0ff;
            --accent-red: #ff2a2a;
            --text-main: #ffffff;
            --text-muted: #6b7c96;
            --panel-border: rgba(0, 240, 255, 0.15);
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        .header-banner {
            background: linear-gradient(135deg, var(--accent-red) 0%, #111 25%, #111 75%, var(--panel-border) 100%);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent-red);
            position: relative;
            z-index: 5000;
        }

        .header-banner h1 { margin: 0; font-size: 1.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; }

        .status-indicator {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--border-cyan);
            padding: 4px 10px;
            border-radius: 20px;
            margin-top: 5px;
            background: rgba(0, 240, 255, 0.05);
        }

        .hud-tabs-container { display: flex; align-items: center; justify-content: center; margin: 25px auto; max-width: 1000px; }
        .hud-tabs { display: flex; background: rgba(255, 255, 255, 0.03); padding: 4px; border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .hud-tab-btn { background: none; border: none; color: var(--text-muted); padding: 10px 24px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.3s; }
        .hud-tab-btn.active { color: var(--text-main); background: linear-gradient(to bottom, rgba(255, 42, 42, 0.2), transparent); border-bottom: 2px solid var(--accent-red); }

        .hud-massive-arrow { position: fixed; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--accent-red); font-size: 8rem; cursor: pointer; z-index: 10000; padding: 20px; }
        .massive-arrow-left { left: 80px; } .massive-arrow-right { right: 80px; }

        .tab-content { display: none; width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 20px; box-sizing: border-box; }
        .tab-content.active { display: block; }

        /* Estilos de paneles y cards */
        .showcase-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .robot-viewport { position: relative; width: 100%; max-width: 380px; margin: 20px 0; }
        .specs-panel { background: var(--panel-bg); border: 1px solid var(--panel-border); width: 100%; border-radius: 4px; padding: 25px; }
        .panel-title { color: var(--accent-red); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .telemetry-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .telemetry-card { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 4px; padding: 20px; }
        
        .big-numeric { font-size: 3rem; font-weight: 800; color: var(--border-cyan); margin: 10px 0; font-family: 'Courier New', monospace; }
        .chart-box { height: 100px; background: rgba(0,0,0,0.3); border-radius: 4px; overflow: hidden; margin-top: 15px; }
        .gauge-box { height: 160px; display: flex; justify-content: center; align-items: center; position: relative; margin-top: 10px; }
        
        .ir-row { display: flex; justify-content: space-between; gap: 15px; margin-top: 25px; }
        .ir-sensor { flex: 1; padding: 15px; font-size: 0.8rem; font-weight: bold; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); color: var(--text-muted); border-radius: 4px; }
        .ir-sensor.active-line { background: rgba(0, 240, 255, 0.1); border-color: var(--border-cyan); color: var(--border-cyan); }

        .math-display { font-size: 1.6rem; padding: 25px; background: rgba(0,0,0,0.4); border-radius: 4px; font-family: 'Courier New', monospace; margin: 20px auto; max-width: 600px; border: 1px solid rgba(255,255,255,0.03); }
        .spec-block-item { background: rgba(6, 10, 19, 0.6); padding: 14px 16px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.03); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header-banner">
        <h1>Carrito Evasor de Obstáculos con RF</h1>
        <div id="status-mqtt" class="status-indicator">📡 CONECTANDO TELEMETRÍA...</div>
    </div>

    <button class="hud-massive-arrow massive-arrow-left" onclick="adjustTab(-1)">&#10216;</button>
    <button class="hud-massive-arrow massive-arrow-right" onclick="adjustTab(1)">&#10217;</button>

    <div class="hud-tabs-container">
        <div class="hud-tabs">
            <button class="hud-tab-btn active" id="btn-0" onclick="switchTab(0)">01 // Ficha Técnica</button>
            <button class="hud-tab-btn" id="btn-1" onclick="switchTab(1)">02 // Telemetría en Vivo</button>
            <button class="hud-tab-btn" id="btn-2" onclick="switchTab(2)">03 // Análisis Dinámico</button>
        </div>
    </div>

    <div id="tab-0" class="tab-content active">
        </div>

    <div id="tab-1" class="tab-content">
        <div class="telemetry-grid">
            <div class="telemetry-card">
                <h4 class="panel-title">Distancia de Obstáculo</h4>
                <div id="val-dist" class="big-numeric">--</div>
                <div class="chart-box"><canvas id="chart-dist"></canvas></div>
            </div>
            <div class="telemetry-card">
                <h4 class="panel-title">Tacómetro (RPM)</h4>
                <div class="gauge-box"><canvas id="gauge-rpm"></canvas></div>
            </div>
            <div class="telemetry-card">
                <h4 class="panel-title">Barrido Servo</h4>
                <div id="val-servo" class="big-numeric" style="color: var(--accent-red)">90&deg;</div>
                <div class="chart-box"><canvas id="chart-servo"></canvas></div>
            </div>
            <div class="telemetry-card">
                <h4 class="panel-title">Detección Infrarroja (Piso)</h4>
                <div class="ir-row">
                    <div id="ir-izq" class="ir-sensor">MÓDULO IZQUIERDO</div>
                    <div id="ir-der" class="ir-sensor">MÓDULO DERECHO</div>
                </div>
            </div>
            <div class="telemetry-card" style="grid-column: 1 / -1;">
                <h4 class="panel-title">Gráfica General de Flujo (Dist/Servo/IR/RPM)</h4>
                <div class="chart-box" style="height: 150px;"><canvas id="chart-main"></canvas></div>
            </div>
        </div>
    </div>

    <div id="tab-2" class="tab-content">
        </div>

    <script>
        const AIO_USER = "dieglot"; const AIO_KEY = "aio_ZDIL93htQcCNZPsK" + "GWzc2DiXU9Ii";
        const AIO_FEED = "dieglot/feeds/telemetria";
        const BROKER = "wss://io.adafruit.com:443/mqtt";

        let activeTabIdx = 0;
        let storeDist = [], storeRPM = [], storeServo = [], storeMain = [];
        const maxPoints = 20;
        let currentRPMValue = 0;

        function switchTab(index) {
            activeTabIdx = index;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.hud-tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${index}`).classList.add('active');
            document.getElementById(`btn-${index}`).classList.add('active');
        }

        function draw(id, data, max, color) {
            const canvas = document.getElementById(id);
            if(!canvas || canvas.width === 0) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2.5;
            data.forEach((val, i) => {
                const x = (canvas.width / (maxPoints - 1)) * i;
                const y = canvas.height - (val / max * canvas.height * 0.75) - 12;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        function drawAll() {
            draw('chart-dist', storeDist, 150, '#00f0ff');
            draw('chart-servo', storeServo, 180, '#ffaa00');
            draw('chart-main', storeMain, 300, '#ff2a2a'); // Nueva gráfica
        }

        const client = mqtt.connect(BROKER, { username: AIO_USER, password: AIO_KEY });
        client.on('message', (topic, msg) => {
            const raw = msg.toString().split(',');
            if(raw.length >= 5) {
                const d = parseInt(raw[0]), s = parseInt(raw[1]), r = parseInt(raw[4]);
                
                // Actualizar historial
                storeDist.push(d); storeServo.push(s); 
                // Sumatoria simple para gráfica general
                storeMain.push((d + s + r) / 3);
                
                [storeDist, storeServo, storeMain].forEach(arr => { if(arr.length > maxPoints) arr.shift(); });

                document.getElementById('val-dist').innerText = d + " cm";
                currentRPMValue = r;
                
                if(activeTabIdx === 1) drawAll();
            }
        });
    </script>
</body>
</html>
