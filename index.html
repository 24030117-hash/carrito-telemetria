    <title>Dashboard Telemetría - Premium Racing Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* MANTENIENDO TU CSS ORIGINAL INTACTO */
        :root {
            --bg-puro: #06090e;
            --neon-cian: #00f0ff;
            --neon-rojo: #ff2a2a;
            /* ...resto de variables... */
        }
        /* ... (Todo tu CSS previo se mantiene igual) ... */

        /* INTEGRACIÓN EXACTA DE LAS FLECHAS */
        .nav-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            cursor: pointer;
            width: 40px;
            height: 60px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            align-items: center;
            justify-content: center;
        }

        .nav-arrow div {
            width: 12px;
            height: 12px;
            border-right: 2px solid var(--neon-cian);
            border-top: 2px solid var(--neon-cian);
            transition: all 0.3s ease;
        }

        .f-izq { left: 15px; }
        .f-izq div { transform: rotate(-135deg); }
        .f-der { right: 15px; }
        .f-der div { transform: rotate(45deg); }

        .nav-arrow:hover div {
            border-color: var(--neon-rojo);
            filter: drop-shadow(0 0 5px var(--neon-rojo));
        }
    </style>
</head>

    </div>
    <div class="nav-arrow f-der" onclick="cambiarTab(1)">
        <div></div><div></div><div></div>
    </div>
