<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetría - Ingeniería Automotriz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 15px;
            background: linear-gradient(145deg, #121212, #000000);
            border-bottom: 3px solid #ff0000;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2);
        }
        header h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .status-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            background-color: #222;
            color: #aaa;
            border: 1px solid #444;
        }
        .status-connected { background-color: rgba(0, 255, 0, 0.1); color: #00ff00; border-color: #00ff00; }
        .status-error { background-color: rgba(255, 0, 0, 0.1); color: #ff0000; border-color: #ff0000; }
        .status-connecting { background-color: rgba(255, 165, 0, 0.1); color: #ffa500; border-color: #ffa500; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background-color: #141414;
            border: 1px solid #262626;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: #ff0000;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.1);
        }
        .card .title {
            font-size: 0.9rem;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .card .value {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffffff;
            font-family: monospace;
        }
        .card .unit {
            font-size: 1rem;
            color: #ff0000;
            margin-left: 5px;
        }
        .raw-data-box {
            max-width: 1200px;
            margin: 25px auto 0 auto;
            background-color: #111;
            border: 1px solid #222;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .raw-data-box span { color: #ff0000; }
    </style>
</head>
<body>

    <header>
        <h1>Carrito Evasor de Obstáculos con RF</h1>
        <div id="status" class="status-badge status-connecting">CONECTANDO A ADAFRUIT IO...</div>
    </header>

    <div class="dashboard">
        <div class="card">
            <div class="title">Distancia Ultrasónico</div>
            <div class="value" id="val-distancia">0<span class="unit">cm</span></div>
        </div>

        <div class="card">
            <div class="title">Ángulo Servo</div>
            <div class="value" id="val-servo">0<span class="unit">°</span></div>
        </div>

        <div class="card">
            <div class="title">Sensor IR Izquierdo</div>
            <div class="value" id="val-ir-izq">--</div>
        </div>

        <div class="card">
            <div class="title">Sensor IR Derecho</div>
            <div class="value" id="val-ir-der">--</div>
        </div>

        <div class="card">
            <div class="title">Velocidad Motores</div>
            <div class="value" id="val-rpm">0<span class="unit">RPM</span></div>
        </div>
    </div>

    <div class="raw-data-box">
        >> Último paquete recibido (Cadena RF): <span id="raw-string">Esperando datos por transmisión...</span>
    </div>

    <script type="text/javascript">
        // --- CREDENCIALES CONFIGURADAS DIRECTAMENTE ---
        const AIO_USERNAME = "dieglot";
        const AIO_KEY      = "aio_gkYf00LGwIMKpubC1PnQXdQ9MyMA"; 
        const AIO_FEED     = AIO_USERNAME + "/feeds/telemetria";

        // Servidor Seguro WebSockets de Adafruit IO
        const MQTT_SERVER  = "io.adafruit.com";
        const MQTT_PORT    = 443; 
        const CLIENT_ID    = "web_dashboard_" + Math.random().toString(16).substr(2, 8);

        // Inicializamos el cliente Paho MQTT
        const client = new Paho.MQTT.Client(MQTT_SERVER, MQTT_PORT, CLIENT_ID);

        // Configuración de callbacks
        client.onConnectionLost = onConnectionLost;
        client.onMessageArrived = onMessageArrived;

        const options = {
            useSSL: true,
            userName: AIO_USERNAME,
            password: AIO_KEY,
            onSuccess: onConnect,
            onFailure: onFailure,
            reconnect: true,
            keepAliveInterval: 30
        };

        // Conectar al Broker
        client.connect(options);

        function onConnect() {
            console.log("Conectado con éxito a Adafruit IO MQTT");
            const statusBadge = document.getElementById("status");
            statusBadge.innerText = "ONLINE - MONITOREANDO CARRO";
            statusBadge.className = "status-badge status-connected";
            
            // Suscribirse al canal donde el ESP32 publica
            client.subscribe(AIO_FEED);
        }

        function onFailure(message) {
            console.log("Fallo de conexión: " + message.errorMessage);
            const statusBadge = document.getElementById("status");
            statusBadge.innerText = "❌ ERROR DE CREDENCIALES O SERVIDOR";
            statusBadge.className = "status-badge status-error";
        }

        function onConnectionLost(responseObject) {
            if (responseObject.errorCode !== 0) {
                console.log("Conexión perdida: " + responseObject.errorMessage);
                const statusBadge = document.getElementById("status");
                statusBadge.innerText = "⚠️ DESCONECTADO - RECONECTANDO...";
                statusBadge.className = "status-badge status-connecting";
            }
        }

        // Procesar los datos que envía el ESP32 en tiempo real
        function onMessageArrived(message) {
            const payload = message.payloadString.trim();
            document.getElementById("raw-string").innerText = payload;

            // Formato esperado enviado por el ESP32: "Distancia,Servo,IR_Izq,IR_Der,RPM"
            // Ejemplo: "57,90,1,1,0"
            const datos = payload.split(",");

            if (datos.length === 5) {
                const distancia = datos[0];
                const servo     = datos[1];
                const irIzq     = parseInt(datos[2]);
                const irDer     = parseInt(datos[3]);
                const rpm       = datos[4];

                // Actualizar los elementos visuales en el HTML
                document.getElementById("val-distancia").innerHTML = `${distancia}<span class="unit">cm</span>`;
                document.getElementById("val-servo").innerHTML     = `${servo}<span class="unit">°</span>`;
                document.getElementById("val-rpm").innerHTML       = `${rpm}<span class="unit">RPM</span>`;

                // Procesamiento de lectura de sensores de línea IR (1 = Línea/Objeto, 0 = Vacío)
                const txtIrIzq = document.getElementById("val-ir-izq");
                if (irIzq === 1) {
                    txtIrIzq.innerText = "DETECTADO";
                    txtIrIzq.style.color = "#ff0000";
                } else {
                    txtIrIzq.innerText = "LIBRE";
                    txtIrIzq.style.color = "#00ff00";
                }

                const txtIrDer = document.getElementById("val-ir-der");
                if (irDer === 1) {
                    txtIrDer.innerText = "DETECTADO";
                    txtIrDer.style.color = "#ff0000";
                } else {
                    txtIrDer.innerText = "LIBRE";
                    txtIrDer.style.color = "#00ff00";
                }
            }
        }
    </script>
</body>
</html>
