<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Telemetría en Vivo</title>
    <style>
        /* Estilos Generales de la Interfaz */
        body {
            background-color: #03070d;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .sub-header {
            background-color: #00bcd4;
            color: #03070d;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 10px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Contenedor Grid Principal */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* Diseño Base de las Tarjetas (Cards) */
        .card {
            background-color: rgba(6, 14, 26, 0.7);
            border: 1px solid #10223b;
            border-radius: 4px;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        .card-title {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .title-red { color: #ff3333; }
        .title-yellow { color: #ffcc00; }

        /* Tarjeta de Distancia */
        .card-distancia { grid-column: 1; grid-row: 1; }
        
        /* TARJETA DETECCIÓN INFRARROJA: Mantiene su posición pero se adapta al nuevo tamaño interno */
        .card-infrarrojo { 
            grid-column: 1; 
            grid-row: 2; 
        }

        /* Contenedor del dibujo modificado para ampliar el tamaño */
        .infrarrojo-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 15px;
            padding: 10px 0;
        }

        /* TEXTO DETECTED / TRACKING... */
        .tracking-status {
            font-family: 'Courier New', Courier, monospace;
            color: #4b6b94;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        /* AJUSTE CLAVE: Escalado del dibujo del coche sin romper el diseño */
        .carrito-vector-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            /* Escalamos la altura del área de dibujo para que el coche se vea más grande */
            height: 140px; 
        }

        .carrito-dibujo {
            /* Aumentamos la escala del SVG/Imagen manteniendo su proporción */
            height: 100%; 
            width: auto;
            max-width: 100%;
            object-fit: contain;
            opacity: 0.85;
        }

        /* Estilo de los textos de los sensores laterales */
        .sensor-label {
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            color: #4b6b94;
            text-align: center;
            line-height: 1.3;
            max-width: 80px;
        }

        /* Tarjetas Restantes para la Estructura */
        .card-tacometro { grid-column: 2; grid-row: 1 / span 2; }
        .card-servo { grid-column: 3; grid-row: 1 / span 2; }

    </style>
</head>
<body>

    <div class="header-title">Carrito Evasor de Obstáculos con RF</div>
    <div class="sub-header">LIVE: TELEMETRÍA ONLINE</div>

    <div class="dashboard-grid">
        
        <div class="card card-distancia">
            <div class="card-title title-red">▪ Distancia de Obstáculo</div>
            <div style="color: #00bcd4; font-size: 32px; font-weight: bold;">--</div>
        </div>

        <div class="card card-infrarrojo">
            <div class="card-title title-red">▪ Detección Infrarroja (Piso)</div>
            
            <div class="tracking-status">TRACKING. . .</div>
            
            <div class="infrarrojo-container">
                
                <div class="sensor-label">
                    SENSOR<br>IZQUIERDO<br><span style="color:#3a4f6d;">OFF</span>
                </div>
                
                <div class="carrito-vector-wrapper">
                    <svg class="carrito-dibujo" viewBox="0 0 100 130" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="20" y="15" width="60" height="100" rx="12" stroke="#152942" stroke-width="3" fill="#081220"/>
                        <rect x="15" y="25" width="5" height="20" rx="2" fill="#10223b"/>
                        <rect x="80" y="25" width="5" height="20" rx="2" fill="#10223b"/>
                        <rect x="15" y="85" width="5" height="20" rx="2" fill="#10223b"/>
                        <rect x="80" y="85" width="5" height="20" rx="2" fill="#10223b"/>
                        <line x1="30" y1="45" x2="70" y2="45" stroke="#10223b" stroke-width="2"/>
                        <line x1="30" y1="85" x2="70" y2="85" stroke="#10223b" stroke-width="2"/>
                    </svg>
                </div>
                
                <div class="sensor-label">
                    SENSOR<br>DERECHO<br><span style="color:#3a4f6d;">OFF</span>
                </div>
                
            </div>
        </div>

        <div class="card card-tacometro">
            <div class="card-title title-yellow">▪ Tacómetro (RPM)</div>
            <div style="text-align: center; font-size: 40px; margin-top: 40px; font-weight: bold;">0</div>
        </div>

        <div class="card card-servo">
            <div class="card-title title-yellow">▪ Barrido Servo HC-SR04</div>
            <div style="color: #ffcc00; font-size: 36px; font-weight: bold;">90 °</div>
        </div>

    </div>

</body>
</html>
