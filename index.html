<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetry System | F1-Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-principal: #050505;
            --bg-tarjeta: #0a0a0a;
            --color-activo: #00f2ff; /* Cyan F1 */
            --color-alerta: #ff003c; /* Rojo Carrera */
            --color-exito: #00ff6a;
            --borde-tecnico: 2px solid #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-principal);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
        }

        h1, .btn-pestana, .tarjeta-titulo { font-family: 'Orbitron', sans-serif; }

        .franja-header {
            border-bottom: 3px solid var(--color-activo);
            background: #000;
            padding: 20px;
        }

        .texto-header h1 { font-size: 24px; letter-spacing: 4px; }

        /* Estilo de Tarjetas Estricto */
        .tarjeta-medicion, .tarjeta-ficha, .tarjeta-calculo {
            background: var(--bg-tarjeta);
            border: var(--borde-tecnico);
            border-radius: 0; /* Bordes afilados */
            position: relative;
        }

        .tarjeta-medicion::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; width: 10px; height: 10px;
            border-top: 2px solid var(--color-activo);
            border-left: 2px solid var(--color-activo);
        }

        .tarjeta-valor {
            font-family: 'Share Tech Mono', monospace;
            font-size: 40px;
            color: var(--color-activo);
        }

        .btn-pestana {
            border: var(--borde-tecnico);
            background: #111;
            color: #777;
            border-radius: 0;
            transition: 0.2s;
        }

        .btn-pestana.activa {
            background: var(--color-activo);
            color: #000;
            font-weight: bold;
        }

        .sensor-ir {
            font-family: 'Share Tech Mono';
            border: 2px solid #444;
            background: #000;
        }

        .sensor-ir.detection {
            background: var(--color-alerta);
            color: #fff;
            border-color: #fff;
        }

        /* Ajuste para el gráfico */
        .canvas-contenedor { height: 120px; }
    </style>
</head>
<body>
    <div class="franja-header">
        <div class="contenido-franja">
            <div class="texto-header">
                <h1>UNIT_STATUS: ACTIVE</h1>
                <div id="status-box" class="estado-conexion">
                    <div class="punto-pulso"></div>
                    <span id="status-text">SYSTEM_READY</span>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
