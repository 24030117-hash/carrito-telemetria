<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Telemetry Control</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #050505;
            --carbon-fiber: #121212;
            --f1-cyan: #00f2fe;
            --f1-red: #ff0055;
            --f1-green: #39ff14;
            --border-glow: rgba(0, 242, 254, 0.3);
        }

        body {
            background-color: var(--bg-deep);
            color: white;
            font-family: 'Rajdhani', sans-serif; /* Fuente tipo digital */
            text-transform: uppercase;
        }

        /* Tarjeta tipo fibra de carbono */
        .tarjeta-ficha, .tarjeta-medicion, .tarjeta-calculo {
            background: var(--carbon-fiber);
            border: 1px solid var(--border-glow);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            border-radius: 0; /* Estilo F1 recto y técnico */
        }

        h2, .tarjeta-titulo {
            color: var(--f1-cyan);
            letter-spacing: 2px;
            font-weight: 800;
        }

        /* Efecto de brillo en valores */
        .tarjeta-valor {
            text-shadow: 0 0 10px var(--f1-cyan);
        }

        .btn-pestana.activa {
            background: var(--f1-cyan);
            color: black;
            box-shadow: 0 0 20px var(--f1-cyan);
        }

        .franja-header {
            background: linear-gradient(90deg, #1a1a1a, #000);
            border-bottom: 2px solid var(--f1-cyan);
        }

        /* Añadimos el toque tecnológico al sensor IR */
        .sensor-ir.detection {
            background: var(--f1-red);
            box-shadow: 0 0 15px var(--f1-red);
        }
    </style>
</head>
<body>
    <div class="franja-header">
        <div class="contenido-franja">
            <div class="texto-header">
                <h1>F1 MISSION CONTROL: FAU</h1>
                <div id="status-box" class="estado-conexion">
                    <div class="punto-pulso"></div>
                    <span id="status-text">TELEMETRY LINK: ACTIVE</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Tu lógica JavaScript se mantiene igual para seguir recibiendo datos
        // ...
    </script>
</body>
</html>
