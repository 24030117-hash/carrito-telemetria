<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Telemetría - Racing Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-puro: #06090e;
            --neon-rojo: #ff2a2a;
            --texto-secundario: #64748b;
        }

        body {
            background-color: var(--bg-puro);
            color: #fff;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- FLECHAS DE NAVEGACIÓN CHEVRON RACING --- */
        .nav-chevron {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 20px;
        }

        .left-arrow { left: 10px; }
        .right-arrow { right: 10px; }

        .chevron {
            width: 25px;
            height: 8px;
            background: var(--texto-secundario);
            transition: all 0.3s ease;
        }

        /* Diseño de flecha */
        .left-arrow .chevron { clip-path: polygon(100% 0, 0 50%, 100% 100%, 80% 100%, 20% 50%, 80% 0); }
        .right-arrow .chevron { clip-path: polygon(0 0, 100% 50%, 0 100%, 20% 100%, 80% 50%, 20% 0); }

        /* Efecto de barrido al pasar el mouse */
        .nav-chevron:hover .chevron {
            background: var(--neon-rojo);
            filter: drop-shadow(0 0 8px var(--neon-rojo));
        }
        
        .nav-chevron:hover .chevron:nth-child(1) { transition-delay: 0s; }
        .nav-chevron:hover .chevron:nth-child(2) { transition-delay: 0.1s; }
        .nav-chevron:hover .chevron:nth-child(3) { transition-delay: 0.2s; }

        /* Layout */
        .contenedor-principal { flex: 1; padding: 40px; display: flex; align-items: center; justify-content: center; }
        .tarjeta-hud { background: #0f172a; border: 1px solid #333; padding: 30px; width: 100%; max-width: 800px; }
    </style>
</head>
<body>

    <div class="nav-chevron left-arrow" onclick="cambiarTab(-1)">
        <div class="chevron"></div><div class="chevron"></div><div class="chevron"></div>
    </div>
    <div class="nav-chevron right-arrow" onclick="cambiarTab(1)">
        <div class="chevron"></div><div class="chevron"></div><div class="chevron"></div>
    </div>

    <div class="contenedor-principal">
        <div id="tab-0" class="tarjeta-hud">
            <h2>CONFIGURACIÓN DEL SISTEMA</h2>
            <p>Contenido principal del dashboard...</p>
        </div>
    </div>

    <script>
        function cambiarTab(dir) { console.log("Cambiando:", dir); }
    </script>
</body>
</html>
