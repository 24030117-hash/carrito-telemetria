<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Telemetría - Premium Racing Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-puro: #06090e;
            --neon-cian: #00f0ff;
            --neon-rojo: #ff2a2a;
            --neon-rojo-dim: #991b1b;
            --plata-metal: #e2e8f0;
            --texto-principal: #ffffff;
            --texto-secundario: #64748b;
            --glass-bg: rgba(10, 16, 26, 0.75);
            --glass-borde: rgba(0, 240, 255, 0.15);
            --glass-borde-rojo: rgba(255, 42, 42, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background-color: var(--bg-puro);
            color: var(--texto-principal);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            background-image: radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 0.4) 0%, #04060a 100%), linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111), linear-gradient(45deg, #111 25%, #181818 25%, #181818 75%, #111 75%, #111);
            background-size: 100% 100%, 8px 8px, 8px 8px;
        }

        /* --- NUEVO DISEÑO DE FLECHAS TRIPLES (CHEVRONS) --- */
        .contenedor-chevron {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 100;
            padding: 20px;
        }
        .f-izq { left: 10px; }
        .f-der { right: 10px; }

        .chevron-linea {
            width: 15px;
            height: 30px;
            background: var(--texto-secundario);
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        /* Forma angular de las flechas */
        .f-izq .chevron-linea { clip-path: polygon(100% 0, 30% 50%, 100% 100%, 70% 100%, 0% 50%, 70% 0); }
        .f-der .chevron-linea { clip-path: polygon(0 0, 70% 50%, 0 100%, 30% 100%, 100% 50%, 30% 0); }

        /* Efecto Hover */
        .contenedor-chevron:hover .chevron-linea {
            background: var(--neon-rojo);
            opacity: 1;
            filter: drop-shadow(0 0 8px var(--neon-rojo));
        }

        /* Resto de tu diseño (Header, Tabs, etc. se mantiene igual) */
        .franja-header { width: 100%; height: 80px; position: relative; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; background: rgba(4, 6, 9, 0.9); border-bottom: 2px solid var(--neon-cian); margin-bottom: 40px; }
        .contenedor-principal { max-width: 1440px; margin: 0 auto; padding: 0 25px 40px 25px; }
        .barra-pestanas { display: flex; justify-content: center; gap: 12px; margin-bottom: 35px; }
        .btn-pestana { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.08); color: var(--texto-secundario); padding: 12px 26px; font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%); }
        .btn-pestana.activa { background: rgba(220, 38, 38, 0.2); color: #ffffff; border: 1px solid var(--neon-rojo); }
        .contenido-pestana { display: none; }
        .contenido-pestana.activa { display: block; }
        .grid-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; }
        .tarjeta-hud { background: var(--glass-bg); border: 1px solid var(--glass-borde); border-radius: 6px; padding: 30px; backdrop-filter: blur(12px); position: relative; }
        .wrapper-render { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; min-height: 450px; }
        .tabla-valores { width: 100%; border-collapse: collapse; }
        .tabla-valores td { padding: 16px 10px; }
    </style>
</head>
<body>

    <div class="franja-header">
        <div class="header-content-centro">
            <h1>CARRITO EVASOR DE OBSTÁCULOS CON RF</h1>
        </div>
    </div>

    <div class="contenedor-chevron f-izq" onclick="cambiarTab(-1)">
        <div class="chevron-linea"></div>
        <div class="chevron-linea"></div>
        <div class="chevron-linea"></div>
    </div>

    <div class="contenedor-chevron f-der" onclick="cambiarTab(1)">
        <div class="chevron-linea"></div>
        <div class="chevron-linea"></div>
        <div class="chevron-linea"></div>
    </div>

    <div class="contenedor-principal">
        <div class="barra-pestanas">
            <button class="btn-pestana activa" onclick="irTab(0)">01 // FICHA TÉCNICA</button>
            <button class="btn-pestana" onclick="irTab(1)">02 // TELEMETRÍA EN VIVO</button>
        </div>

        <div id="tab-0" class="contenido-pestana activa">
            <div class="grid-layout">
                <div class="wrapper-render">
                    <img src="carrito.png" class="render-principal" alt="Carrito">
                </div>
                <div class="tarjeta-hud">
                    <h2>CONFIGURACIÓN DEL SISTEMA</h2>
                    <table class="tabla-valores">
                        <tr><td>Unidad de Control</td><td>ESP32 WROOM 32U</td></tr>
                        <tr><td>Enlace de Radio</td><td>HC-12 Transceiver</td></tr>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tabActual = 0;
        function irTab(num) {
            document.querySelectorAll('.contenido-pestana').forEach(el => el.classList.remove('activa'));
            document.querySelectorAll('.btn-pestana').forEach(el => el.classList.remove('activa'));
            document.getElementById(`tab-${num}`).classList.add('activa');
            document.querySelectorAll('.btn-pestana')[num].classList.add('activa');
            tabActual = num;
        }
        function cambiarTab(dir) {
            let siguiente = tabActual + dir;
            if(siguiente > 1) siguiente = 0;
            if(siguiente < 0) siguiente = 1;
            irTab(siguiente);
        }
    </script>
</body>
</html>
